filter {
  # Kiểm tra nếu log đến từ WAF (dựa trên đường dẫn file)
  if "modsecurity" in [log][file][path] {
    
    # Giải mã chuỗi JSON từ ModSecurity
    json {
      source => "message"
      target => "waf"
    }

    # Phân loại tấn công dựa trên Tags của OWASP CRS
    if [waf][transaction][messages] {
      ruby {
        code => "
          event.get('[waf][transaction][messages]').each do |msg|
            if msg['details']['tags']
              msg['details']['tags'].each do |tag|
                if tag =~ /attack-sqli/
                  event.set('attack_type', 'SQL Injection')
                elsif tag =~ /attack-xss/
                  event.set('attack_type', 'Cross-Site Scripting (XSS)')
                elsif tag =~ /attack-lfi/
                  event.set('attack_type', 'Local File Inclusion (LFI)')
                elsif tag =~ /attack-rce/
                  event.set('attack_type', 'Remote Code Execution (RCE)')
                elsif tag =~ /protocol-attack/
                  event.set('attack_type', 'Protocol Violation')
                end
              end
            end
          end
        "
      }
    }
  }
  # Thiết lập Throttling cho cảnh báo Telegram
  if [attack_type] {
    throttle {
      key => "%{[waf][transaction][client_ip]}"
      before_count => 10
      period => 60
      #max_age => 120
      add_tag => "exceeded_limit"
    }
  }

}
